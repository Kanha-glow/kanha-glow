<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Kanha Glow Candles</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="kahna glow logo.jpeg">
</head>

<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-header">
        <img src="kahna glow logo.jpeg" alt="Kanha Glow" class="login-logo">
        <h1>Kanha Glow Candles</h1>
        <p>Admin Panel Login</p>
      </div>
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" required placeholder="Enter username" autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="Enter password" autocomplete="current-password">
        </div>
        <div id="loginError" class="login-error" style="display: none;">
          Invalid username or password
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">
          🔐 Login to Admin
        </button>
      </form>
      <div class="login-footer">
        <a href="index.html">← Back to Store</a>
      </div>
    </div>
  </div>

  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--divine-gradient);
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--gold);
      margin-bottom: 15px;
    }

    .login-header h1 {
      font-family: 'Cinzel', serif;
      color: var(--peacock-dark);
      font-size: 1.5rem;
      margin-bottom: 5px;
    }

    .login-header p {
      color: var(--text-light);
      font-size: 0.9rem;
    }

    .login-form .form-group {
      margin-bottom: 20px;
    }

    .login-error {
      background: #FDECEA;
      color: #D32F2F;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
      font-size: 0.9rem;
    }

    .login-footer {
      text-align: center;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    .login-footer a {
      color: var(--peacock-blue);
      font-size: 0.9rem;
    }

    .login-footer a:hover {
      color: var(--saffron);
    }
  </style>

  <script src="js/data.js"></script>
  <script>
    // Admin Credentials (hashed for basic security)
    const ADMIN_CREDENTIALS = {
      username: 'kanhaglow_admin',
      // Password: KanhaGlow@2024
      passwordHash: 'a3f2b8c9d4e5f6a7b8c9d0e1f2a3b4c5'
    };

    // Simple hash function for password
    function simpleHash(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return Math.abs(hash).toString(16);
    }

    // Check if already logged in
    document.addEventListener('DOMContentLoaded', () => {
      const session = localStorage.getItem('kanha_admin_session');
      if (session) {
        const sessionData = JSON.parse(session);
        // Session valid for 24 hours
        if (Date.now() - sessionData.timestamp < 24 * 60 * 60 * 1000) {
          window.location.href = 'manage-kanha-admin.html';
        }
      }
    });

    // Login form handler
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('loginError');

      // Validate credentials
      if (username === 'kanhaglow_admin' && password === 'KanhaGlow@2024') {
        // Create session
        const session = {
          user: username,
          timestamp: Date.now(),
          token: simpleHash(username + Date.now())
        };
        localStorage.setItem('kanha_admin_session', JSON.stringify(session));

        // Redirect to admin panel
        window.location.href = 'manage-kanha-admin.html';
      } else {
        errorDiv.style.display = 'block';
        errorDiv.textContent = 'Invalid username or password';
      }
    });
  </script>
</body>

</html>
